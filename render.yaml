services:
  - type: web
    name: policylens-api
    env: python
    pythonVersion: 3.11.9
    plan: free
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT